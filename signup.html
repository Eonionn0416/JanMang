<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in</title>
  <link rel="stylesheet" href="./css/signup.css" />
</head>
<body>
  <div class="page">
    <div class="toprow">
      <div class="titletext">Sign in</div>
      <a id="dynamicAuthBtn" class="btn btn--fixed" href="./index.html" title="Back to feed">Back to reel</a>
    </div>

    <div class="panel">
      <div class="row">
        <label>Site (SCK / SCK+)</label>
        <select id="site" class="sel">
          <option value="">선택</option>
          <option value="SCK">SCK</option>
          <option value="SCK+">SCK+</option>
        </select>
      </div>

      <div class="row">
        <label for="signupRole">회원 구분</label>
        <select id="signupRole" class="sel">
          <option value="member">일반 회원</option>
          <option value="developer">개발자 회원</option>
          <option value="finance">총무</option>
        </select>
      </div>

      <div class="row">
        <label>부서</label>
        <input id="dept" class="in" type="text" placeholder="예) PE / EQ / IT ..." />
      </div>

      <div class="row">
        <label>Email</label>
        <input id="email" class="in" type="email" placeholder="email@example.com" />
      </div>

      <div class="row">
        <label>이름</label>
        <input id="name" class="in" type="text" placeholder="김잔망" />
      </div>

      <div class="row">
        <label>직급</label>
        <select id="rank" class="sel">
          <option value="">선택</option>
          <option value="주임">주임</option>
          <option value="선임">선임</option>
          <option value="책임">책임</option>
          <option value="차석">차석</option>
        </select>
      </div>

      <div class="row">
        <label>ID(사번)</label>
        <input id="empId" class="in" type="text" placeholder="예) 123456" />
      </div>

      <div class="row">
        <label>Password</label>
        <div class="pwwrap">
          <input id="pw" class="in" type="password" placeholder="password" />
          <button id="togglePw" class="eye" type="button" aria-label="비밀번호 보기/숨기기">👁</button>
        </div>
      </div>

      <div class="row">
        <label>Password verify</label>
        <div class="pwwrap">
          <input id="pw2" class="in" type="password" placeholder="password verify" />
          <button id="togglePw2" class="eye" type="button" aria-label="비밀번호 확인 보기/숨기기">👁</button>
        </div>
      </div>

      <div class="actions">
        <button id="signupBtn" class="btn btn--fixed" type="button">Sign in</button>
      </div>

      <div id="signupMsg" class="hint"></div>
    </div>
  </div>

  <script type="module" src="./js/auth-signup.js"></script>
  <script type="module" src="./js/auth-ui.js"></script>
</body>
</html>
