<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in</title>
  <link rel="stylesheet" href="./css/login.css" />
</head>
<body>
  <div class="page">
    <div class="toprow">
      <div class="titletext">Log in</div>
      <a id="dynamicAuthBtn" class="btn btn--fixed" href="./index.html" title="Back to feed">Back to reel</a>
    </div>

    <div class="panel">
      <div class="hint">Email로 로그인 가능</div>

      <div class="row">
        <label>1. Email</label>
        <input id="loginId" class="in" type="text" placeholder="예) 123456 또는 email@example.com" />
      </div>

      <div class="row">
        <label>2. Password</label>
        <div class="pwwrap">
          <input id="loginPw" class="in" type="password" placeholder="password" />
          <button id="toggleLoginPw" class="eye" type="button" aria-label="비밀번호 보기/숨기기">👁</button>
        </div>
      </div>

      <div class="actions">
        <button id="loginBtn" class="btn btn--fixed" type="button">Log in</button>
        <a class="btn btn--fixed" href="./signup.html">Sign in</a>
      </div>

      <div id="loginMsg" class="hint"></div>
    </div>
  </div>

  <script type="module" src="./js/auth-login.js"></script>
  <script type="module" src="./js/auth-ui.js"></script>
</body>
</html>
