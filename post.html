<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Event Detail</title>
  <link rel="stylesheet" href="./css/index.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-title">Event Detail</span></div>
    <div class="top-right">
      <div class="auth">
        <a class="btn" href="./index.html">Home</a>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="feed">
      <div class="cards-grid single-card-grid">
        <article class="card detail-card">
          <div class="detail-head">
            <div>
              <div id="detailType" class="card-meta">—</div>
              <h2 id="detailTitle">Loading...</h2>
            </div>
            <div class="detail-head-actions">
              <span id="detailStatus" class="badge">—</span>
              <button id="deleteEventBtn" class="btn danger-btn" type="button" hidden>Delete</button>
            </div>
          </div>

          <div class="detail-meta-grid">
            <div><b>Writer</b>: <span id="detailWriter">—</span></div>
            <div><b>Updated</b>: <span id="detailUpdated">—</span></div>
            <div><b>Event Date</b>: <span id="detailEventDate">—</span></div>
            <div><b>Location</b>: <span id="detailEventLocation">—</span></div>
          </div>

          <div class="detail-section">
            <h3>Description</h3>
            <div id="detailDescription" class="detail-box">—</div>
          </div>

          <div class="detail-section">
            <h3>Image</h3>
            <div id="detailImage" class="detail-box">—</div>
            <div id="eventProofSection" class="detail-section nested-image-upload-section" hidden>
              <div class="meeting-upload-card" style="margin-top:12px;">
                <label for="eventProofImage" class="meeting-upload-label">Event / Meeting Image</label>
                <label for="eventProofImage" class="meeting-upload-dropzone">
                  <div class="meeting-upload-dropzone-title">이미지를 여러 개 선택해 주세요</div>
                  <div class="meeting-upload-dropzone-sub">event 첨부 이미지 + 추가 업로드 이미지를 한곳에서 관리합니다</div>
                  <div class="meeting-upload-dropzone-action">파일 선택</div>
                </label>
                <input id="eventProofImage" class="meeting-upload-input" type="file" accept="image/*" multiple />
                <div id="eventProofPreview" class="meeting-upload-preview empty">선택된 이미지가 없습니다.</div>
                <div class="detail-actions meeting-upload-actions">
                  <button id="saveEventProofBtn" class="btn" type="button">Save</button>
                </div>
                <div class="card-meta">게시자 또는 참석자로 등록된 사람만 저장/변경/삭제할 수 있습니다.</div>
              </div>
            </div>
            <div id="detailMeetingImages" class="detail-box" style="margin-top:12px;">—</div>
          </div>

          <div class="detail-section">
            <h3>Attendees</h3>
            <div id="detailAttendees" class="detail-box">—</div>
          </div>

          <div class="detail-section">
            <h3>Attachment</h3>
            <div id="detailAttachment" class="detail-box">—</div>
          </div>

        </article>
      </div>
    </section>

    <aside class="sidebar">
      <div class="sidebar-box menu-box">
        <div class="sidebar-title">Menu</div>
        <nav class="menu-list" aria-label="메뉴">
          <a class="menu-link" href="./request.html">Request</a>
          <a class="menu-link is-active" href="./event.html">Event</a>
          <a class="menu-link" href="./statistics.html">Statistics</a>
          <a class="menu-link" href="./manual.html">Manual</a>
        </nav>
      </div>
    </aside>
  </main>

  <div id="imagePreviewModal" class="modal-backdrop" hidden>
    <div class="modal-card image-preview-modal-card">
      <div class="modal-head">
        <h3>Image Preview</h3>
        <button id="closeImagePreviewBtn" class="btn" type="button">닫기</button>
      </div>
      <div class="image-preview-modal-body">
        <img id="imagePreviewModalImg" src="" alt="preview" />
      </div>
    </div>
  </div>

  <div id="postMsg" class="hint"></div>

  <script type="module" src="./js/post.js"></script>
</body>
</html>
