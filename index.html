<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JM Homepage</title>
  <link rel="stylesheet" href="./css/index.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-title">JM Homepage</span>
    </div>

    <div class="top-right">
      <div class="filter">
        <label class="sr-only" for="filterSelect">Filter</label>
        <select id="filterSelect">
          <option value="all">전체</option>
          <option value="request">Request</option>
          <option value="event">Event</option>
        </select>

        <div class="search-stack">
          <input id="searchInput" type="text" placeholder="검색어" autocomplete="off" />
          <div id="memberSearchPanel" class="member-search-panel" hidden>
            <div class="member-search-head">
              <strong>회원 검색</strong>
              <span class="card-meta">★ 즐겨찾기 상단 고정</span>
            </div>
            <div id="memberSearchList" class="member-search-list"></div>
          </div>
        </div>
        <button id="applyFilterBtn" class="btn" type="button">검색</button>
      </div>

      <div class="auth auth-actions">
        <button id="notificationBtn" class="btn notification-btn" type="button">
          알림센터
          <span id="notificationDot" class="notif-dot" hidden></span>
        </button>
        <button id="directMessageBtn" class="btn notification-btn" type="button">
          Direct Message
          <span id="directMessageDot" class="notif-dot" hidden></span>
        </button>
        <a id="dynamicAuthBtn" class="btn" href="./login.html">회원가입 / Log in</a>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="feed" aria-label="게시물 피드">
      <div id="cardsGrid" class="cards-grid"></div>
      <div id="sentinel" class="sentinel"></div>
    </section>

    <aside class="sidebar" aria-label="우측 메뉴">
      <div class="sidebar-box menu-box">
        <div class="sidebar-title">Menu</div>
        <nav class="menu-list" aria-label="메뉴">
          <a class="menu-link" id="navRequest" href="./request.html">Request</a>
          <a class="menu-link" id="navEvent" href="./event.html">Event</a>
          <a class="menu-link" id="navStatistics" href="./statistics.html">Statistics</a>
          <a class="menu-link" href="./manual.html">Manual</a>
        </nav>
      </div>
      <div class="sidebar-box menu-box mini-calendar-box">
        <div class="sidebar-title">Calendar</div>
        <div id="miniCalendar" class="mini-calendar"></div>
      </div>
    </aside>
  </main>

  <div id="notificationModal" class="modal-backdrop" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <h3>알림센터</h3>
        <div class="modal-head-actions">
          <button id="markAllNotificationsReadBtn" class="btn" type="button">모두 읽음</button>
          <button id="deleteAllNotificationsBtn" class="btn" type="button">전체 삭제</button>
          <button id="closeNotificationBtn" class="btn" type="button">닫기</button>
        </div>
      </div>
      <div id="notificationList" class="notification-list"></div>
    </div>
  </div>



  <div id="directMessageModal" class="modal-backdrop" hidden>
    <div class="modal-card dm-modal-card">
      <div class="modal-head">
        <h3>Direct Message</h3>
        <button id="closeDirectMessageBtn" class="btn" type="button">닫기</button>
      </div>
      <div class="dm-layout">
        <aside class="dm-sidebar">
          <div class="dm-sidebar-head">
            <strong>채팅</strong>
            <button id="newDmBtn" class="btn" type="button">새 대화</button>
          </div>
          <div id="directThreadList" class="direct-thread-list"></div>
        </aside>
        <section class="dm-main">
          <div id="directMessageEmpty" class="dm-empty">좌측에서 대화를 선택하거나 새 대화를 시작해 주세요.</div>
          <div id="directMessagePanel" class="dm-panel" hidden>
            <div id="directMessageHeader" class="dm-panel-head"></div>
            <div id="directMessageHistory" class="direct-message-history"></div>
            <div class="direct-message-composer">
              <textarea id="directMessageInput" placeholder="메시지를 입력하세요"></textarea>
              <button id="sendDirectMessageBtn" class="btn" type="button">전송</button>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div id="likesModal" class="modal-backdrop" hidden>
    <div class="modal-card member-picker-card">
      <div class="modal-head">
        <h3>좋아요 누른 사람</h3>
        <button id="closeLikesModalBtn" class="btn" type="button">닫기</button>
      </div>
      <div id="likesModalList" class="member-picker-list"></div>
    </div>
  </div>

  <div id="memberPickerModal" class="modal-backdrop" hidden>
    <div class="modal-card member-picker-card">
      <div class="modal-head">
        <h3 id="memberPickerTitle">회원 선택</h3>
        <button id="closeMemberPickerBtn" class="btn" type="button">닫기</button>
      </div>
      <input id="memberPickerSearchInput" class="member-picker-search" type="text" placeholder="이름, 이메일로 검색" autocomplete="off" />
      <div id="memberPickerList" class="member-picker-list"></div>
    </div>
  </div>


  <div id="eventDayModal" class="modal-backdrop" hidden>
    <div class="modal-card member-picker-card">
      <div class="modal-head">
        <h3 id="eventDayModalTitle">Event List</h3>
        <button id="closeEventDayModalBtn" class="btn" type="button">닫기</button>
      </div>
      <div id="eventDayModalList" class="member-picker-list"></div>
    </div>
  </div>


  <div id="guideModal" class="modal-backdrop guide-modal" hidden>
    <div class="modal-card guide-modal-card" role="dialog" aria-modal="true" aria-labelledby="guideModalTitle">
      <div class="modal-head">
        <h3 id="guideModalTitle">JM Homepage 사용 가이드</h3>
      </div>
      <p class="guide-modal-desc">처음 1회만 보여지는 안내 화면입니다. 이미지를 확인한 뒤 Confirm 버튼을 눌러 주세요.</p>
      <img class="guide-modal-image" src="./assets/manual-guide.png" alt="JM Homepage 사용 가이드 이미지" />
      <div class="guide-modal-actions">
        <button id="guideConfirmBtn" class="btn" type="button">Confirm</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
  <script type="module" src="./js/auth-ui.js"></script>
  <script type="module" src="./js/nav-guard.js"></script>
</body>
</html>
