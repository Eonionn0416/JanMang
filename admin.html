<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin</title>
  <link rel="stylesheet" href="./css/index.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-title">Admin</span></div>
    <div class="top-right">
      <div class="auth">
        <a id="dynamicAuthBtn" class="btn" href="./index.html">Back to reel</a>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="feed">
      <div class="card" style="padding:16px;">
        <h3>회원가입자 목록</h3>
        <div id="adminMsg" class="hint"></div>
        <div style="overflow:auto;">
          <table id="usersTable" border="1" cellpadding="8" style="width:100%; border-collapse:collapse;">
            <thead>
              <tr>
                <th>Email</th>
                <th>가입일</th>
                <th>회원구분(role)</th>
                <th>등급(tier)</th>
                <th>시즌</th>
                <th>저장</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <aside class="sidebar">
      <div class="sidebar-box">
        <div class="sidebar-title">Admin Menu</div>
        <ol class="sidebar-list">
          <li><a href="./index.html">Home</a></li>
        </ol>
      </div>
    </aside>
  </main>

  <script type="module" src="./js/auth-ui.js"></script>
  <script type="module" src="./js/admin.js"></script>
</body>
</html>
